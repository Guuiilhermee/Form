<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="shortcut icon" href="../images/loginicon.png" type="image/x-icon">
    <title>Login</title>
</head>
<body>
    
    <h1>Login</h1>

    <form action="#" method="post">
        <fieldset>
            <legend>Entre com seus dados de acesso</legend>

            <label for="user">Usuário</label>
            <input type="text" id="user" required autofocus>

            <label for="pass">Senha</label>
            <input type="password" id="pass" required>

            <div class="actions">
                <input type="reset" value="Apagar" class="btn2 btn--apagar">
                <input type="submit" value="Entrar" class="btn2">
            </div>
        </fieldset>
    </form>

</body>
</html>
