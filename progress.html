<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress e Meter</title>
      <style>
    @import url('https://fonts.googleapis.com/css2?family=Sora:wght@100..800&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap');

    body{
        font-family: "Ubuntu", sans-serif;
    }
  </style>
</head>
<body>
    <h1>Meter</h1>

    <label for="combustivel">Nível do combustível</label><br>
    <meter id="combustivel" min="0" max="100" low="30" high="90" value="25" optimum="95"></meter>

    <h1>Progress</h1>

    <label> Porcentagem da tarefa <br>
    <progress max="100" value="75"> 75% </progress>
    </label><br><br>
    <progress></progress>

    <h1>Output</h1>
    <form oninput="result.value = Number(a.value) + Number(b.value)">
        <input type="number" name="a" id="a"> +
        <input type="number" name="b" id="b"> =
        <output name="result" for="a b">0</output>
    </form><br>
    <form oninput="result.value=a.value-b.value">
        <input type="number" name="a" id="a"> -
        <input type="number" name="b" id="b"> =
        <output name="result" for="a b">0</output>
    </form><br>
    <form oninput="result.value=a.value*b.value">
        <input type="number" name="a" id="a"> *
        <input type="number" name="b" id="b"> =
        <output name="result" for="a b">0</output>
    </form><br>
    <form oninput="result.value=a.value/b.value">
        <input type="number" name="a" id="a"> /
        <input type="number" name="b" id="b"> =
        <output name="result" for="a b">0</output>
    </form>
</body>
</html>
